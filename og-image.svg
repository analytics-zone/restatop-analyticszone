<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#103d27"/>
      <stop offset="100%" style="stop-color:#2d8a68"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle pattern circles -->
  <circle cx="1050" cy="100" r="200" fill="white" opacity="0.04"/>
  <circle cx="150" cy="530" r="160" fill="white" opacity="0.04"/>
  <!-- Logo circle -->
  <circle cx="180" cy="180" r="70" fill="white" opacity="0.15"/>
  <circle cx="180" cy="180" r="56" fill="white"/>
  <text x="180" y="200" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#1b5e20" text-anchor="middle">R</text>
  <!-- Brand name -->
  <text x="280" y="206" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="white" letter-spacing="-2">RestaTop</text>
  <!-- Tagline -->
  <text x="180" y="340" font-family="Arial, sans-serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.9)">The complete restaurant guide for Barcelona</text>
  <!-- Stats bar -->
  <rect x="180" y="400" width="840" height="2" fill="rgba(255,255,255,0.3)"/>
  <text x="180" y="460" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="white">9,634 restaurants</text>
  <text x="450" y="460" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.7)"> · </text>
  <text x="480" y="460" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="white">All neighborhoods</text>
  <text x="730" y="460" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.7)"> · </text>
  <text x="760" y="460" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="white">Free app</text>
  <!-- URL -->
  <text x="180" y="560" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">restatop.analyticszone.app</text>
</svg>
